[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Cache buster - change this to force fresh build
  CACHE_BUSTER = "2026-01-18-fix-cdn-cache"

## Next.js plugin for Netlify
## This handles API routes, middleware, and SSR automatically
[[plugins]]
  package = "@netlify/plugin-nextjs"

# PR deploy previews build and deploy on Netlify. The site is now on the
# Pro/Personal plan (25,000 build-min/mo), so the Free-plan quota that forced
# us to skip preview builds in #261 no longer applies. Deploy previews give
# reviewers a live, rendered URL per PR, which the GitHub Actions
# `build-and-e2e` job (headless `next build` + Cypress) cannot.
#
# `ignore` runs before each build: exit 0 cancels the build, non-zero proceeds.
# The production context has no `ignore`, so pushes to main always build and
# deploy. Branch-deploy stays skipped: per-branch deploys are lower value than
# PR previews and would still spend minutes with no reviewer attached.
[context.branch-deploy]
  ignore = "exit 0"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
